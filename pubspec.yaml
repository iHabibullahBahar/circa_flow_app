name: circa_flow_main
description: CircaFlow
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  get: ^4.7.3
  
  # Networking
  internet_connection_checker_plus: ^2.9.1+2
  dio: ^5.9.2

  # Real-time & Messaging
  flutter_chat_ui: ^2.11.1
