  device_info_plus: ^11.2.0
  app_version_update: ^6.2.0


  # Localization
  easy_localization: ^3.0.8

  flutter_native_splash: ^2.4.7
  app_links: ^6.4.1
  package_info_plus: ^9.0.1
  upgrader: ^13.1.0
  pub_semver: ^2.2.0
  onesignal_flutter: ^5.5.2
  timeago: ^3.7.0
  gap: ^3.0.1
  flyer_chat_image_message: ^2.3.0
  photo_manager: ^3.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

