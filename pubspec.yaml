  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1

  # Environment
  flutter_dotenv: ^6.0.0

  # Logging
  logger: ^2.6.2

  # Media
  image_picker: ^1.2.1
  just_audio: ^0.9.40
