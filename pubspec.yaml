  # State Management
  fpdart: ^1.2.0
  equatable: ^2.0.7
  flutter_hooks: ^0.20.5

  # Backend – Firebase

  # Backend – Supabase

  # Backend – Appwrite

  # Storage
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

  # Images & SVG
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.4

  # Icons
  hugeicons: ^1.1.5

  # Shimmer / Skeleton
  skeletonizer: ^2.1.3

  # Responsive UI
  flutter_screenutil: ^5.9.3

